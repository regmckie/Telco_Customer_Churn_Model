name: Build and Push to Docker Hub

# When do we push? --> Everytime we push a change into our main branch on GitHub
on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest  # Which operating system we're using

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx # modern Docker builder that supports multi-platform builds
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: regmckie314/telco-customer-churn-fastapi:latest